<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: Arial, sans-serif; } .title { font-size: 24px; font-weight: bold; } .label { font-size: 14px; } .box { fill: #F4F7FF; stroke: #3B62FF; stroke-width: 2px; } .arrow { fill: none; stroke: #304FFE; stroke-width: 2px; marker-end: url(#arrowhead);} </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#304FFE" />
    </marker>
  </defs>
  <text x="30" y="40" class="title">Electricity Demand TSA System Architecture</text>
  <rect x="40" y="80" width="235" height="110" class="box" rx="10"/>
  <text x="55" y="110" class="label">Data Layer</text>
  <text x="55" y="135" class="label">- Synthetic demand time series</text>
  <text x="55" y="155" class="label">- National/state/city hierarchy</text>
  <rect x="360" y="80" width="235" height="110" class="box" rx="10"/>
  <text x="375" y="110" class="label">Feature Engineering</text>
  <text x="375" y="135" class="label">- Fourier seasonality terms</text>
  <text x="375" y="155" class="label">- Calendar & trend signals</text>
  <rect x="680" y="80" width="235" height="110" class="box" rx="10"/>
  <text x="695" y="110" class="label">TSA Models</text>
  <text x="695" y="135" class="label">- Global LSTM model</text>
  <text x="695" y="155" class="label">- Shared temporal representation</text>
  <rect x="200" y="250" width="235" height="130" class="box" rx="10"/>
  <text x="215" y="280" class="label">Hierarchy & Reconciliation</text>
  <text x="215" y="305" class="label">- `sktime` hierarchy support</text>
  <text x="215" y="325" class="label">- Bottom-up aggregation</text>
  <text x="215" y="345" class="label">- National/state/city consistency</text>
  <rect x="520" y="250" width="235" height="130" class="box" rx="10"/>
  <text x="535" y="280" class="label">Delivery Layer</text>
  <text x="535" y="305" class="label">- Forecast output files</text>
  <text x="535" y="325" class="label">- Visualizations & PPT summary</text>
  <line x1="275" y1="190" x2="360" y2="190" class="arrow"/>
  <line x1="595" y1="190" x2="680" y2="190" class="arrow"/>
  <line x1="455" y1="230" x2="455" y2="250" class="arrow"/>
  <line x1="320" y1="320" x2="520" y2="320" class="arrow"/>
  <line x1="455" y1="380" x2="455" y2="430" class="arrow"/>
  <text x="90" y="470" class="label">TSA responsibility:</text>
  <text x="90" y="495" class="label">- Data analysis and signal engineering</text>
  <text x="90" y="515" class="label">- Fourier seasonality, LSTM forecasting, hierarchy reconciliation</text>
</svg>